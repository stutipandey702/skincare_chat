<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Skinchat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f7f3ef;
    --surface:   #fdfaf7;
    --border:    #e8ddd4;
    --text:      #2c2420;
    --muted:     #9e8f87;
    --accent:    #b5765a;
    --accent-lt: #edddd4;
    --bot-bg:    #ffffff;
    --user-bg:   #2c2420;
    --user-text: #fdfaf7;
    --radius:    18px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 680px;
    padding: 36px 24px 0;
    position: relative;
    z-index: 1;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .brand-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-bottom: 4px;
    flex-shrink: 0;
  }

  .brand-sub {
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── Chat window ── */
  .chat-wrap {
    width: 100%;
    max-width: 680px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 16px 0;
    position: relative;
    z-index: 1;
  }

  #chat-history {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-bottom: 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ── Messages ── */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 82%;
    animation: fadeUp 0.28s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user  { align-self: flex-end; align-items: flex-end; }
  .msg.bot   { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
    padding: 0 4px;
  }

  .bubble {
    padding: 13px 18px;
    border-radius: var(--radius);
    font-size: 0.92rem;
    line-height: 1.65;
    font-weight: 300;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 5px;
  }

  .msg.bot .bubble {
    background: var(--bot-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
    box-shadow: 0 2px 12px rgba(44,36,32,0.05);
  }

  /* ── Thinking indicator ── */
  .thinking .bubble {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 14px 18px;
    min-width: 72px;
  }

  .dot-pulse {
    display: flex; gap: 5px;
  }

  .dot-pulse span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
  .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40%            { transform: scale(1);   opacity: 1; }
  }

  /* ── Empty state ── */
  .empty-state {
    margin: auto;
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .empty-state svg {
    width: 40px; height: 40px;
    margin-bottom: 14px;
    opacity: 0.35;
  }

  .empty-state p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    font-style: italic;
    line-height: 1.5;
  }

  /* ── Input area ── */
  .input-area {
    position: sticky;
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 80%, transparent);
    padding: 16px 0 28px;
    z-index: 2;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 6px 6px 20px;
    box-shadow: 0 4px 20px rgba(44,36,32,0.08);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 4px 24px rgba(181,118,90,0.15);
  }

  #user_input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    color: var(--text);
    outline: none;
    min-width: 0;
  }

  #user_input::placeholder { color: var(--muted); }

  .send-btn {
    flex-shrink: 0;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
  }

  .send-btn:hover  { background: #9f6249; }
  .send-btn:active { transform: scale(0.93); }

  .send-btn svg { width: 17px; height: 17px; }

  /* ── Scrollbar ── */
  #chat-history::-webkit-scrollbar { width: 4px; }
  #chat-history::-webkit-scrollbar-track { background: transparent; }
  #chat-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-name">Skinchat</span>
    <div class="brand-dot"></div>
  </div>
  <p class="brand-sub">Your skincare ingredient advisor</p>
</header>

<div class="chat-wrap">
  <div id="chat-history">
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
        <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
      </svg>
      <p>Ask me about any skincare<br>ingredient or routine.</p>
    </div>
  </div>

  <div class="input-area">
    <form id="chat-form">
      <div class="input-row">
        <input
          type="text"
          id="user_input"
          placeholder="Ask about an ingredient…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button type="submit" class="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </form>
  </div>
</div>

<script>
const form        = document.getElementById("chat-form");
const input       = document.getElementById("user_input");
const history     = document.getElementById("chat-history");
const emptyState  = document.getElementById("empty-state");
let   isStreaming = false;

function addMessage(role, text = "") {
  emptyState?.remove();

  const wrap   = document.createElement("div");
  wrap.className = `msg ${role}`;

  const label  = document.createElement("div");
  label.className = "msg-label";
  label.textContent = role === "user" ? "You" : "Skinchat";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  history.appendChild(wrap);
  history.scrollTop = history.scrollHeight;

  return bubble; // return so we can append streamed tokens
}

function addThinking() {
  emptyState?.remove();

  const wrap = document.createElement("div");
  wrap.className = "msg bot thinking";
  wrap.id = "thinking";

  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = "Skinchat";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = `<div class="dot-pulse"><span></span><span></span><span></span></div>`;

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  history.appendChild(wrap);
  history.scrollTop = history.scrollHeight;
  return wrap;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  if (isStreaming) return;

  const text = input.value.trim();
  if (!text) return;

  isStreaming = true;
  input.value = "";
  addMessage("user", text);

  const thinkingEl = addThinking();

  try {
    const res = await fetch("/ask/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: text }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    thinkingEl.remove();
    const botBubble = addMessage("bot");

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buffer  = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop(); // keep incomplete last line

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6).trim();
        if (payload === "[DONE]") break;

        try {
          const { token } = JSON.parse(payload);
          botBubble.textContent += token;
          history.scrollTop = history.scrollHeight;
        } catch (_) {}
      }
    }

  } catch (err) {
    thinkingEl.remove();
    const b = addMessage("bot");
    b.textContent = "Sorry, something went wrong. Please try again.";
    b.style.color = "#c0392b";
    console.error(err);
  }

  isStreaming = false;
  input.focus();
});

// Allow Enter to submit, Shift+Enter for newline (future textarea upgrade)
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    form.requestSubmit();
  }
});
</script>
</body>
</html>
