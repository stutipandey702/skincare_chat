<div class="chat-container">
 <div class="chat-history" id="chat-history">
  {% for entry in chat_history %}
    <div class="{{ 'user-message' if entry.from_user else 'bot-message' }}">
      {{ entry.text }}
    </div>
  {% else %}
    <p>No messages yet.</p>
  {% endfor %}
</div>

  <form method="post" id="ingredient-form" class="input-area">
    <input
      type="text"
      name="user_input"
      id="user_input"
      placeholder="Type a skincare ingredient..."
      autocomplete="off"
      required
    />
    <input type="submit" value="Send" />
  </form>
</div>
